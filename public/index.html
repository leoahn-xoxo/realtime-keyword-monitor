<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실시간 검색어 모니터링</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-ico">📊</span>
      <div class="brand-text">
        <h1>실시간 검색어 모니터링</h1>
        <p>네이버 · 구글 · 네이트 · 다음 — 5분마다 자동 갱신</p>
      </div>
    </div>
    <div class="topbar-right">
      <span class="updated">갱신: <b id="updated-at">--:--:--</b></span>
      <button id="btn-cross" class="btn btn-cross">⚡ 교차 키워드</button>
      <button id="btn-refresh" class="btn btn-refresh">🔄 새로고침</button>
    </div>
  </header>

  <main>
    <section id="columns" class="columns"></section>

    <section class="panel">
      <h2 class="panel-title">📈 5분 단위 시계열 <small>매체별 상위 키워드의 지수 추이 · 순위 변동</small></h2>
      <div class="ts-tabs" id="ts-tabs"></div>
      <div class="ts-chart-wrap"><canvas id="ts-chart"></canvas></div>
      <div class="ts-table-wrap"><table id="ts-table" class="ts-table"></table></div>
      <p id="ts-note" class="ts-note"></p>
    </section>

    <section class="panel">
      <h2 class="panel-title">🧩 키워드 토크나이저 &amp; 예측 <small>키워드를 클릭하면 연관 키워드와 다음 예측을 확인합니다</small></h2>
      <div id="tokenizer" class="tokenizer"></div>
      <div id="prediction" class="prediction" hidden></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">🔗 교차 키워드 <span id="cross-count" class="count-badge">0</span> <small>2개 이상 매체에 동시 등장</small></h2>
      <div id="cross" class="cross"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
