<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>말이 술술</title>
<style>
  :root{
    --bg:#f6f4ee; --surface:#ffffff; --ink:#1a1a18; --ink2:#6b6a64; --ink3:#a09e95; --line:rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1b1a18; --surface:#262522; --ink:#f3f1ec; --ink2:#a8a69d; --ink3:#6f6d65; --line:rgba(255,255,255,.12); }
  }
  *{ box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--bg); color:var(--ink); overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;
    -webkit-user-select:none; user-select:none;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 14px);
    height:100dvh;
  }
  .stage{ height:100%; max-width:440px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }

  header{ text-align:center; }
  .eyebrow{ font-size:11px; font-weight:600; letter-spacing:.22em; color:var(--ink3); text-transform:uppercase; }
  h1{ font-size:34px; font-weight:800; letter-spacing:-.02em; line-height:1.05; margin-top:6px; }
  .tag{ font-size:13px; color:var(--ink2); margin-top:7px; letter-spacing:-.01em; }

  .card{
    position:relative; flex:1; min-height:0; overflow:hidden;
    background:var(--surface); border:0.5px solid var(--line); border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    padding:24px; text-align:center; cursor:pointer; transition:transform .12s ease;
  }
  .card:active{ transform:scale(.985); }
  .card.pop #keyword{ animation:pop .34s cubic-bezier(.2,.8,.2,1); }
  @keyframes pop{ 0%{ transform:scale(.82); opacity:.3 } 60%{ transform:scale(1.04) } 100%{ transform:scale(1) } }

  .deco{ position:absolute; pointer-events:none; }
  .ring{ width:160px; height:160px; border-radius:50%; border:1.5px solid var(--line); top:-54px; right:-46px; opacity:.7; }
  .ring2{ width:90px; height:90px; border-radius:50%; border:1.5px solid var(--line); bottom:-30px; left:-24px; opacity:.55; }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--ink3); opacity:.35; top:26px; left:26px; }

  #badge{ position:relative; z-index:1; font-size:13px; font-weight:700; padding:6px 15px; border-radius:999px; letter-spacing:-.01em; }
  #keyword{ position:relative; z-index:1; font-size:36px; font-weight:800; line-height:1.28; letter-spacing:-.025em; }
  .cardhint{ position:relative; z-index:1; font-size:11.5px; color:var(--ink3); letter-spacing:.01em; }

  #grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .tile{
    border:none; border-radius:14px; padding:13px 4px; font-size:13px; font-weight:700;
    font-family:inherit; cursor:pointer; letter-spacing:-.03em; line-height:1.15;
    display:flex; align-items:center; justify-content:center; min-height:52px; transition:transform .1s ease;
  }
  .tile:active{ transform:scale(.93); }
  .foot{ text-align:center; font-size:11.5px; color:var(--ink3); }
</style>
</head>
<body>
<div class="stage">
  <header>
    <p class="eyebrow">first dinner · 한 잔의 기술</p>
    <h1>말이 술술</h1>
    <p class="tag">한 장 뽑고, 한 잔 가고 🥂</p>
  </header>

  <div id="card" class="card">
    <span class="deco ring"></span><span class="deco ring2"></span><span class="deco dot"></span>
    <div id="badge">오늘의 주제</div>
    <p id="keyword">탭해서<br>시작</p>
    <p class="cardhint">카드 탭 = 전체 랜덤 · 아래 = 주제별</p>
  </div>

  <div id="grid"></div>
  <p class="foot">주제를 탭하면 한 장씩 펼쳐집니다</p>
</div>

<script>
const CATS = [
  {name:'일상',    l:'#E1F5EE',d:'#0F6E56', dl:'#0F6E56',dd:'#9FE1CB'},
  {name:'취향',    l:'#EEEDFE',d:'#3C3489', dl:'#3C3489',dd:'#CECBF6'},
  {name:'먹부림',  l:'#FAECE7',d:'#993C1D', dl:'#993C1D',dd:'#F5C4B3'},
  {name:'술',      l:'#FAEEDA',d:'#854F0B', dl:'#854F0B',dd:'#FAC775'},
  {name:'운세·점', l:'#EEEDFE',d:'#3C3489', dl:'#3C3489',dd:'#CECBF6'},
  {name:'여가',    l:'#E6F1FB',d:'#0C447C', dl:'#0C447C',dd:'#B5D4F4'},
  {name:'아이·딸', l:'#FBEAF0',d:'#72243E', dl:'#72243E',dd:'#F4C0D1'},
  {name:'일·일터', l:'#EAF3DE',d:'#3B6D11', dl:'#3B6D11',dd:'#C0DD97'},
  {name:'트렌드',  l:'#FCEBEB',d:'#791F1F', dl:'#791F1F',dd:'#F7C1C1'},
  {name:'추억',    l:'#F1EFE8',d:'#5F5E5A', dl:'#444441',dd:'#D3D1C7'},
];
const CARDS = [
  [0,'주말'],[0,'요즘 날씨'],[0,'동네 · 사는 곳'],[0,'출퇴근길'],[0,'아침형 vs 저녁형'],[0,'요즘 빠진 거'],[0,'반려동물'],[0,'잠 · 수면 패턴'],[0,'건강검진 결과 ㅎ'],[0,'노안 · 돋보기'],[0,'흰머리 · 새치'],[0,'챙겨먹는 영양제'],[0,'요즘 체력'],
  [1,'넷플릭스 · 드라마'],[1,'노래 · 플레이리스트'],[1,'커피 취향'],[1,'MBTI'],[1,'좋아하는 계절'],[1,'덕질 · 최애'],[1,'쇼핑 스타일'],[1,'인생 영화'],[1,'즐겨보는 유튜브'],[1,'노래방 18번'],[1,'정주행한 드라마'],
  [2,'맛집'],[2,'우리 동네 맛집'],[2,'숨은 맛집'],[2,'단골집'],[2,'배달음식'],[2,'야식'],[2,'못 먹는 음식'],[2,'인생 디저트'],[2,'편의점 꿀조합'],[2,'집밥 vs 외식'],[2,'해장 메뉴'],[2,'회 vs 고기'],[2,'국물 요리'],[2,'인생 라면'],
  [3,'와인'],[3,'맥주'],[3,'위스키'],[3,'소주'],[3,'막걸리 · 전통주'],[3,'하이볼'],[3,'칵테일'],[3,'최애 주종'],[3,'주량 · 한도'],[3,'숙취 해소법'],[3,'안주 궁합'],[3,'첫 술 기억'],[3,'술 약해진 요즘 ㅎ'],[3,'다음날 컨디션'],[3,'홈술 vs 밖술'],[3,'2차 어디로'],
  [4,'사주'],[4,'타로'],[4,'신점'],[4,'별자리 운세'],[4,'손금'],[4,'신년운세 · 토정비결'],[4,'꿈 해몽'],[4,'점 보러 간 썰'],[4,'믿는 편? 안 믿는 편?'],[4,'인생 점괘'],[4,'올해 운세'],[4,'삼재'],[4,'궁합'],[4,'이사 · 이름 운'],
  [5,'여행'],[5,'운동'],[5,'취미'],[5,'캠핑 · 차박'],[5,'드라이브'],[5,'요즘 핫플'],[5,'가보고 싶은 곳'],[5,'주말 나들이'],[5,'골프'],[5,'등산 · 트레킹'],[5,'자전거 · 라이딩'],[5,'헬스 · PT'],
  [6,'딸 키우기'],[6,'요즘 초등 학원'],[6,'받아쓰기 · 알림장'],[6,'아이 최애 캐릭터'],[6,'키즈 유튜브'],[6,'학교 친구 관계'],[6,'용돈 교육'],[6,'아이 장래희망'],[6,'사춘기 전조 ㅎ'],[6,'학부모 모임'],[6,'아이 스마트폰 언제?'],[6,'영어 교육 고민'],[6,'키 크는 법'],
  [7,'재택 vs 출근'],[7,'요즘 점심값'],[7,'AI가 바꾼 내 일'],[7,'챗GPT 써봤어요?'],[7,'인상 깊었던 광고'],[7,'요즘 교실 풍경'],[7,'워라밸'],[7,'N잡 · 부업'],[7,'전업주부 하루 일과'],[7,'노후 준비'],[7,'내 집 마련'],[7,'낀 세대 (상사·후배)'],[7,'번아웃'],
  [8,'2026 월드컵'],[8,'응원하는 팀 · 선수'],[8,'AI 그림 · 챗봇'],[8,'숏폼 (릴스 · 쇼츠)'],[8,'요즘 유행어'],[8,'핫한 드라마 · 예능'],[8,'러닝 열풍'],[8,'올해 가본 여행지'],[8,'임영웅 · 트로트'],[8,'콘서트 · 페스티벌'],[8,'오마카세'],[8,'골프웨어'],
  [9,'어릴 때 별명'],[9,'학창시절'],[9,'첫 직장'],[9,'옛날 게임'],[9,'그때 그 유행'],[9,'추억의 노래'],[9,'학교 앞 분식'],[9,'삐삐 · 시티폰'],[9,'싸이월드'],[9,'스타크래프트 · PC방'],[9,'MP3 · 워크맨'],[9,'H.O.T vs 젝키'],[9,'첫 휴대폰'],[9,'옛날 오락실'],[9,'첫 차'],[9,'나이트의 추억'],
];

const dark = matchMedia('(prefers-color-scheme: dark)').matches;
const cardEl=document.getElementById('card'), badgeEl=document.getElementById('badge'), kwEl=document.getElementById('keyword'), gridEl=document.getElementById('grid');
let busy=false, last=null;

function renderGrid(){
  CATS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='tile'; b.textContent=c.name;
    b.style.cssText = dark ? `background:${c.d};color:${c.dd};` : `background:${c.l};color:${c.dl};`;
    b.onclick=()=>draw(i);
    gridEl.appendChild(b);
  });
}
function poolFor(i){ return i==null ? CARDS : CARDS.filter(c=>c[0]===i); }
function show(card){ const c=CATS[card[0]];
  badgeEl.style.background = dark? c.d : c.l;
  badgeEl.style.color = dark? c.dd : c.dl;
  badgeEl.textContent = c.name;
  kwEl.textContent = card[1];
}
function pick(p){ let n; do{ n=p[Math.floor(Math.random()*p.length)]; }while(p.length>1 && n[1]===last); last=n[1]; return n; }
function draw(i){
  if(busy) return; busy=true;
  const p=poolFor(i); let t=0; const total=8;
  (function step(){
    show(pick(p)); t++;
    if(t<total){ setTimeout(step, 38 + t*t*3); }
    else { busy=false; cardEl.classList.remove('pop'); void cardEl.offsetWidth; cardEl.classList.add('pop'); }
  })();
}
cardEl.onclick=()=>draw(null);
renderGrid();
</script>
</body>
</html>
